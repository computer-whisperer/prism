name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc clang pkg-config \
            libwayland-dev libxkbcommon-dev libdbus-1-dev \
            libdrm-dev libgbm-dev libudev-dev libinput-dev libseat-dev \
            libdisplay-info-dev libvulkan-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  build-test:
    name: Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      # smithay drives DRM/GBM/libinput/libseat/udev and binds wayland +
      # xkbcommon + libdisplay-info as system libs; the *-sys crates use
      # pkg-config (+ libclang for bindgen). Vulkan is dlopen'd at runtime
      # (ash "loaded"), so libvulkan-dev is only here for completeness.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc clang pkg-config \
            libwayland-dev libxkbcommon-dev libdbus-1-dev \
            libdrm-dev libgbm-dev libudev-dev libinput-dev libseat-dev \
            libdisplay-info-dev libvulkan-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --all-targets --locked

      - name: Run library tests
        run: cargo test --workspace --lib --locked
